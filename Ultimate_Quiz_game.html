<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Quiz Game Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .container {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            width: 100%;
            height: calc(100vh - 24px);
            max-height: calc(100vh - 24px);
            overflow: hidden;
            display: grid;
            grid-template-rows: auto auto auto 1fr auto;
        }

        /* Header Section */
        .header {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            color: #1976d2;
            padding: 16px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }

        .header h1 {
            font-size: 22px;
            margin: 0;
            font-weight: 800;
            color: #1976d2;
        }

        .header p {
            font-size: 12px;
            color: #757575;
            margin: 4px 0 0 0;
        }

        /* Progress Bar */
        .progress-section {
            padding: 12px 16px;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
            color: #424242;
            font-weight: 600;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2196f3 0%, #1976d2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Timer Section */
        .timer-section {
            padding: 10px 16px;
            text-align: center;
            background: #f5f5f5;
        }

        .timer {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            color: #2196f3;
            border: 2px solid #2196f3;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            transition: all 0.3s ease;
        }

        .timer.warning {
            color: #ff9800;
            border-color: #ff9800;
        }

        .timer.danger {
            color: #f44336;
            border-color: #f44336;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        /* Main Content */
        .quiz-content {
            padding: 16px;
            overflow: auto;
            background: white;
            min-height: 0;
        }

        .question-section {
            margin-bottom: 14px;
        }

        .question-number {
            font-size: 10px;
            color: #757575;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.8px;
        }

        .question-text {
            font-size: 16px;
            color: #212121;
            font-weight: 700;
            line-height: 1.5;
        }

        /* Options Section */
        .options-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            font-size: 14px;
            color: #424242;
            font-weight: 500;
            position: relative;
        }

        .option::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: transparent;
            border-radius: 12px 0 0 12px;
            transition: background 0.3s ease;
        }

        .option:hover:not(.disabled) {
            border-color: #2196f3;
            background: #e3f2fd;
            transform: translateX(4px);
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.2);
        }

        .option.selected {
            border-color: #2196f3;
            background: #e3f2fd;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.2);
        }

        .option.selected::before {
            background: #2196f3;
        }

        .option.correct {
            border-color: #4caf50;
            background: #e8f5e8;
            color: #2e7d32;
        }

        .option.correct::before {
            background: #4caf50;
        }

        .option.incorrect {
            border-color: #f44336;
            background: #ffebee;
            color: #c62828;
        }

        .option.incorrect::before {
            background: #f44336;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .option-icon {
            margin-right: 10px;
        }

        /* Difficulty Selector */
        .difficulty-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 30px;
            text-align: center;
        }

        .difficulty-title {
            font-size: 28px;
            color: #1976d2;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .difficulty-buttons {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }

        .difficulty-btn {
            padding: 16px 24px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            color: #424242;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .difficulty-btn:hover {
            border-color: #2196f3;
            background: #e3f2fd;
            transform: translateY(-2px);
        }

        .difficulty-btn.easy {
            border-color: #4caf50;
            color: #2e7d32;
        }

        .difficulty-btn.easy:hover {
            background: #e8f5e8;
        }

        .difficulty-btn.medium {
            border-color: #ff9800;
            color: #e65100;
        }

        .difficulty-btn.medium:hover {
            background: #fff3e0;
        }

        .difficulty-btn.hard {
            border-color: #f44336;
            color: #c62828;
        }

        .difficulty-btn.hard:hover {
            background: #ffebee;
        }

        /* Hint Button */
        .hint-section {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: space-between;
        }

        .btn-hint {
            background: #ff9800;
            color: white;
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-hint:hover:not(:disabled) {
            background: #f57c00;
        }

        .btn-hint:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .hint-text {
            padding: 12px;
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            margin-bottom: 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #e65100;
            font-weight: 500;
        }

        /* Streak Counter */
        .streak-section {
            display: flex;
            gap: 16px;
            justify-content: space-around;
            padding: 8px 0;
            margin-bottom: 12px;
        }

        .streak-item {
            text-align: center;
        }

        .streak-label {
            font-size: 11px;
            color: #757575;
            text-transform: uppercase;
            font-weight: 700;
        }

        .streak-value {
            font-size: 24px;
            font-weight: 900;
            color: #f44336;
        }

        /* Review Section */
        .review-section {
            display: none;
        }

        .review-section.show {
            display: block;
        }

        .review-title {
            font-size: 18px;
            color: #1976d2;
            margin-bottom: 16px;
            font-weight: 800;
        }

        .review-item {
            background: #f5f5f5;
            border-left: 4px solid #2196f3;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
        }

        .review-item.correct {
            border-left-color: #4caf50;
        }

        .review-item.incorrect {
            border-left-color: #f44336;
        }

        .review-question {
            font-weight: 700;
            color: #212121;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .review-answer {
            font-size: 13px;
            color: #424242;
            margin-bottom: 4px;
        }

        .review-status {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 4px;
        }

        .review-status.correct {
            background: #e8f5e8;
            color: #2e7d32;
        }

        .review-status.incorrect {
            background: #ffebee;
            color: #c62828;
        }

        /* Footer Section */
        .footer {
            padding: 12px 16px;
            background: #f5f5f5;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .btn-next {
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(33, 150, 243, 0.4);
        }

        .btn-next:active {
            transform: translateY(0);
        }

        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-restart {
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
            color: white;
            width: 100%;
            padding: 12px;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }
        

        .btn-restart:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(74, 144, 226, 0.4);
        }

        /* Final Score Section */
        .final-score-section {
            display: none;
            text-align: center;
            padding: 20px 16px;
            background: white;
            overflow: auto;
        }

        .final-score-section.show {
            display: block;
        }

        .score-title {
            font-size: 20px;
            color: #1976d2;
            margin-bottom: 12px;
            font-weight: 800;
        }

        .score-display {
            font-size: 48px;
            font-weight: 900;
            color: #2196f3;
            margin-bottom: 8px;
        }

        .score-percentage {
            font-size: 18px;
            color: #757575;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .score-details {
            background: #f5f5f5;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 16px;
            text-align: left;
            border: 1px solid #e0e0e0;
        }

        .score-detail-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
            font-size: 13px;
            color: #424242;
        }

        .score-detail-item:last-child {
            border-bottom: none;
        }

        .score-label {
            color: #757575;
            font-weight: 500;
        }

        .score-value {
            color: #1976d2;
            font-weight: 700;
        }

        /* Empty Quiz State */
        .empty-state {
            text-align: center;
            padding: 40px;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 18px;
            color: #666;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 22px;
            }

            .quiz-content {
                padding: 20px;
                min-height: auto;
            }

            .question-text {
                font-size: 18px;
            }

            .option {
                padding: 12px;
                font-size: 14px;
            }

            .timer {
                width: 70px;
                height: 70px;
                font-size: 20px;
            }

            .score-display {
                font-size: 56px;
            }

            .footer {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎯 Ultimate Quiz Game Master</h1>
            <p>Master Your Knowledge</p>
        </div>

        <!-- Progress Bar -->
        <div class="progress-section">
            <div class="progress-info">
                <span>Question <span id="currentQuestion">1</span> of <span id="totalQuestions">10</span></span>
                <span id="scoreDisplay">Score: 0</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- Timer -->
        <div class="timer-section">
            <div class="timer" id="timer">10</div>
        </div>

        <!-- Quiz Content -->
        <div class="quiz-content">
            <!-- Difficulty Selector -->
            <div class="difficulty-section" id="difficultySection">
                <div class="difficulty-title">Choose Difficulty Level</div>
                <div class="difficulty-buttons">
                    <button class="difficulty-btn easy" onclick="startQuizWithDifficulty('easy')">🟢 Easy (15s per question)</button>
                    <button class="difficulty-btn medium" onclick="startQuizWithDifficulty('medium')">🟡 Medium (10s per question)</button>
                    <button class="difficulty-btn hard" onclick="startQuizWithDifficulty('hard')">🔴 Hard (5s per question)</button>
                </div>
            </div>

            <!-- Question Section -->
            <div class="question-section" id="questionSection" style="display: none;">
                <div class="hint-text" id="hintText" style="display: none;"></div>
                <div class="streak-section">
                    <div class="streak-item">
                        <div class="streak-label">Streak</div>
                        <div class="streak-value" id="streakValue">0</div>
                    </div>
                    <div class="streak-item">
                        <div class="streak-label">Best Streak</div>
                        <div class="streak-value" id="bestStreakValue">0</div>
                    </div>
                </div>
                <div class="question-number" id="questionNumber">Question 1</div>
                <div class="question-text" id="questionText"></div>
            </div>

            <!-- Options Section -->
            <div class="options-section" id="optionsSection" style="display: none;"></div>

            <!-- Final Score Section -->
            <div class="final-score-section" id="finalScoreSection">
                <div class="score-title">Quiz Complete! 🎉</div>
                <div class="score-display" id="finalScoreDisplay">0</div>
                <div class="score-percentage" id="scorePercentage">0%</div>
                <div class="score-details">
                    <div class="score-detail-item">
                        <span class="score-label">Total Questions:</span>
                        <span class="score-value" id="totalQuestionsDetail">10</span>
                    </div>
                    <div class="score-detail-item">
                        <span class="score-label">Correct Answers:</span>
                        <span class="score-value" id="correctAnswersDetail">0</span>
                    </div>
                    <div class="score-detail-item">
                        <span class="score-label">Wrong Answers:</span>
                        <span class="score-value" id="wrongAnswersDetail">0</span>
                    </div>
                    <div class="score-detail-item">
                        <span class="score-label">Best Streak:</span>
                        <span class="score-value" id="bestStreakDetail">0</span>
                    </div>
                    <div class="score-detail-item">
                        <span class="score-label">Accuracy:</span>
                        <span class="score-value" id="accuracyDetail">0%</span>
                    </div>
                </div>
                <button class="btn" id="reviewBtn" style="margin-top: 12px; background: #1976d2; color: white;">Review Answers</button>
            </div>

            <!-- Review Section -->
            <div class="review-section" id="reviewSection">
                <div class="review-title">Review Your Answers</div>
                <div id="reviewContent"></div>
                <button class="btn" id="backToResultsBtn" style="margin-top: 16px; background: #1976d2; color: white; width: 100%;">Back to Results</button>
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">📝</div>
                <div class="empty-text">Loading questions...</div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <button class="btn btn-hint" id="hintBtn" style="display: none;" onclick="useHint()">💡 Hint</button>
            <button class="btn btn-next" id="nextBtn" disabled style="display: none;">Next Question</button>
            <button class="btn btn-restart" id="restartBtn" style="display: none;">Restart Quiz</button>
        </div>
    </div>

    <script>
        // Quiz Questions Database with Hints
        const quizQuestions = [
            {
                question: "What is the capital of France?",
                options: ["London", "Paris", "Berlin", "Madrid"],
                correct: 1,
                hint: "It's famous for the Eiffel Tower"
            },
            {
                question: "Which planet is known as the Red Planet?",
                options: ["Venus", "Mars", "Jupiter", "Saturn"],
                correct: 1,
                hint: "Named after the Roman god of war"
            },
            {
                question: "What is the largest ocean on Earth?",
                options: ["Atlantic Ocean", "Indian Ocean", "Arctic Ocean", "Pacific Ocean"],
                correct: 3,
                hint: "It covers an area larger than all land combined"
            },
            {
                question: "Who wrote Romeo and Juliet?",
                options: ["Christopher Marlowe", "William Shakespeare", "Ben Jonson", "John Webster"],
                correct: 1,
                hint: "Famous English playwright from Stratford"
            },
            {
                question: "What is the chemical symbol for Gold?",
                options: ["Go", "Gd", "Au", "Ag"],
                correct: 2,
                hint: "It comes from the Latin word 'Aurum'"
            },
            {
                question: "In which year did World War II end?",
                options: ["1943", "1944", "1945", "1946"],
                correct: 2,
                hint: "The same year Japan surrendered in September"
            },
            {
                question: "What is the smallest prime number?",
                options: ["0", "1", "2", "3"],
                correct: 2,
                hint: "It's the only even prime number"
            },
            {
                question: "Which country is home to the Great Wall?",
                options: ["Japan", "Vietnam", "China", "Mongolia"],
                correct: 2,
                hint: "One of the Seven Wonders of the World"
            },
            {
                question: "What is the main ingredient in guacamole?",
                options: ["Tomato", "Avocado", "Onion", "Lime"],
                correct: 1,
                hint: "A green fruit from Mexico"
            },
            {
                question: "How many continents are there?",
                options: ["5", "6", "7", "8"],
                correct: 2,
                hint: "Asia, Africa, Europe, North America, South America, Antarctica, Australia"
            },
            {
                question: "What is the most spoken language in the world?",
                options: ["English", "Spanish", "Mandarin Chinese", "Hindi"],
                correct: 2,
                hint: "Spoken by over 1 billion native speakers in Asia"
            },
            {
                question: "Which element has the atomic number 1?",
                options: ["Helium", "Hydrogen", "Lithium", "Beryllium"],
                correct: 1,
                hint: "The lightest element, used in balloons"
            }
        ];

        // State Variables
        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;
        let selectedOption = null;
        let timerInterval = null;
        let timeLeft = 10;
        let questions = [];
        let difficulty = 'medium';
        let hintUsed = false;
        let currentStreak = 0;
        let bestStreak = 0;
        let answerHistory = [];
        let timeLimits = { easy: 15, medium: 10, hard: 5 };

        // DOM Elements
        const difficultySection = document.getElementById('difficultySection');
        const questionSection = document.getElementById('questionSection');
        const optionsSection = document.getElementById('optionsSection');
        const nextBtn = document.getElementById('nextBtn');
        const restartBtn = document.getElementById('restartBtn');
        const hintBtn = document.getElementById('hintBtn');
        const timerElement = document.getElementById('timer');
        const progressFill = document.getElementById('progressFill');
        const currentQuestionSpan = document.getElementById('currentQuestion');
        const totalQuestionsSpan = document.getElementById('totalQuestions');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const finalScoreSection = document.getElementById('finalScoreSection');
        const questionText = document.getElementById('questionText');
        const questionNumber = document.getElementById('questionNumber');
        const streakValue = document.getElementById('streakValue');
        const bestStreakValue = document.getElementById('bestStreakValue');
        const hintText = document.getElementById('hintText');
        const reviewBtn = document.getElementById('reviewBtn');
        const reviewSection = document.getElementById('reviewSection');
        const backToResultsBtn = document.getElementById('backToResultsBtn');

        // Start Quiz with Difficulty
        function startQuizWithDifficulty(level) {
            difficulty = level;
            difficultySection.style.display = 'none';
            questionSection.style.display = 'block';
            optionsSection.style.display = 'flex';
            nextBtn.style.display = 'inline-block';
            hintBtn.style.display = 'inline-block';
            
            // Reset state
            currentQuestionIndex = 0;
            score = 0;
            currentStreak = 0;
            bestStreak = 0;
            answered = false;
            selectedOption = null;
            answerHistory = [];

            questions = quizQuestions.sort(() => Math.random() - 0.5);
            totalQuestionsSpan.textContent = questions.length;
            document.getElementById('totalQuestionsDetail').textContent = questions.length;

            loadQuestion();
        }

        // Load Question
        function loadQuestion() {
            if (currentQuestionIndex >= questions.length) {
                showFinalScore();
                return;
            }

            answered = false;
            selectedOption = null;
            hintUsed = false;
            timeLeft = timeLimits[difficulty];
            nextBtn.disabled = true;
            hintBtn.disabled = false;
            hintBtn.textContent = '💡 Hint';
            hintText.style.display = 'none';

            const question = questions[currentQuestionIndex];

            // Update progress
            currentQuestionSpan.textContent = currentQuestionIndex + 1;
            scoreDisplay.textContent = `Score: ${score}`;
            updateProgressBar();

            // Update question
            questionNumber.textContent = `Question ${currentQuestionIndex + 1}`;
            questionText.textContent = question.question;

            // Render options
            optionsSection.innerHTML = question.options
                .map(
                    (option, index) => `
                        <div class="option" data-index="${index}" onclick="selectOption(${index})">
                            <span class="option-icon">○</span>
                            ${option}
                        </div>
                    `
                )
                .join('');

            startTimer();
        }

        // Use Hint
        function useHint() {
            if (answered || hintUsed) return;
            
            hintUsed = true;
            const question = questions[currentQuestionIndex];
            hintText.textContent = '💡 Hint: ' + question.hint;
            hintText.style.display = 'block';
            hintBtn.disabled = true;
            hintBtn.textContent = '✓ Hint Used';
        }

        // Select Option
        function selectOption(index) {
            if (answered) return;

            answered = true;
            selectedOption = index;
            clearInterval(timerInterval);

            const question = questions[currentQuestionIndex];
            const options = document.querySelectorAll('.option');
            const isCorrect = index === question.correct;

            options.forEach((opt, i) => {
                opt.classList.add('disabled');

                if (i === question.correct) {
                    opt.classList.add('correct');
                    opt.innerHTML = `<span class="option-icon">✓</span>${question.options[i]}`;
                }

                if (i === index && i !== question.correct) {
                    opt.classList.add('incorrect');
                    opt.innerHTML = `<span class="option-icon">✗</span>${question.options[i]}`;
                }
            });

            // Track answer for review
            answerHistory.push({
                question: question.question,
                selected: question.options[index],
                correct: question.options[question.correct],
                isCorrect: isCorrect
            });

            // Update streak and score
            if (isCorrect) {
                score++;
                currentStreak++;
                if (currentStreak > bestStreak) {
                    bestStreak = currentStreak;
                }
            } else {
                currentStreak = 0;
            }

            streakValue.textContent = currentStreak;
            bestStreakValue.textContent = bestStreak;
            scoreDisplay.textContent = `Score: ${score}`;
            nextBtn.disabled = false;
            nextBtn.focus();
        }

        // Start Timer
        function startTimer() {
            timerElement.textContent = timeLeft;
            timerElement.classList.remove('warning', 'danger');

            timerInterval = setInterval(() => {
                timeLeft--;
                timerElement.textContent = timeLeft;

                const warnThreshold = timeLimits[difficulty] / 2;
                const dangerThreshold = timeLimits[difficulty] / 3;

                if (timeLeft <= dangerThreshold) {
                    timerElement.classList.add('danger');
                } else if (timeLeft <= warnThreshold) {
                    timerElement.classList.add('warning');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    answered = true;
                    
                    const question = questions[currentQuestionIndex];
                    const options = document.querySelectorAll('.option');
                    
                    answerHistory.push({
                        question: question.question,
                        selected: 'No Answer',
                        correct: question.options[question.correct],
                        isCorrect: false
                    });

                    currentStreak = 0;
                    streakValue.textContent = currentStreak;
                    
                    options.forEach((opt, i) => {
                        opt.classList.add('disabled');
                        if (i === question.correct) {
                            opt.classList.add('correct');
                            opt.innerHTML = `<span class="option-icon">✓</span>${question.options[i]}`;
                        }
                    });

                    nextBtn.disabled = false;
                    nextBtn.focus();
                }
            }, 1000);
        }

        // Update Progress Bar
        function updateProgressBar() {
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            progressFill.style.width = progress + '%';
        }

        // Next Question
        function nextQuestion() {
            currentQuestionIndex++;
            loadQuestion();
        }

        // Show Final Score
        function showFinalScore() {
            questionSection.style.display = 'none';
            optionsSection.style.display = 'none';
            finalScoreSection.classList.add('show');

            const percentage = (score / questions.length) * 100;
            const correct = score;
            const wrong = questions.length - score;

            document.getElementById('finalScoreDisplay').textContent = score;
            document.getElementById('scorePercentage').textContent = Math.round(percentage) + '%';
            document.getElementById('correctAnswersDetail').textContent = correct;
            document.getElementById('wrongAnswersDetail').textContent = wrong;
            document.getElementById('bestStreakDetail').textContent = bestStreak;
            document.getElementById('accuracyDetail').textContent = Math.round(percentage) + '%';

            nextBtn.style.display = 'none';
            hintBtn.style.display = 'none';
            restartBtn.style.display = 'block';
        }

        // Show Review
        function showReview() {
            finalScoreSection.classList.remove('show');
            reviewSection.classList.add('show');

            const reviewContent = document.getElementById('reviewContent');
            reviewContent.innerHTML = answerHistory.map((item, idx) => `
                <div class="review-item ${item.isCorrect ? 'correct' : 'incorrect'}">
                    <div class="review-question">${idx + 1}. ${item.question}</div>
                    <div class="review-answer">Your answer: <strong>${item.selected}</strong></div>
                    <div class="review-answer">Correct answer: <strong>${item.correct}</strong></div>
                    <span class="review-status ${item.isCorrect ? 'correct' : 'incorrect'}">
                        ${item.isCorrect ? '✓ Correct' : '✗ Incorrect'}
                    </span>
                </div>
            `).join('');
        }

        // Back to Results
        function backToResults() {
            reviewSection.classList.remove('show');
            finalScoreSection.classList.add('show');
        }

        // Restart Quiz
        function restartQuiz() {
            difficultySection.style.display = 'flex';
            questionSection.style.display = 'none';
            optionsSection.style.display = 'none';
            finalScoreSection.classList.remove('show');
            reviewSection.classList.remove('show');
            nextBtn.style.display = 'inline-block';
            hintBtn.style.display = 'none';
            restartBtn.style.display = 'none';
        }

        // Event Listeners
        nextBtn.addEventListener('click', nextQuestion);
        restartBtn.addEventListener('click', restartQuiz);
        reviewBtn.addEventListener('click', showReview);
        backToResultsBtn.addEventListener('click', backToResults);

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            difficultySection.style.display = 'flex';
        });
    </script>
</body>
</html>
